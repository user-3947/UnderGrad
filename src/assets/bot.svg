<svg width="25" height="25" viewBox="0 0 25 25" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with radial gradient -->
  <defs>
    <radialGradient id="coolBg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#e0f7ff"></stop>
      <stop offset="100%" stop-color="#d6ccff"></stop>
    </radialGradient>

    <linearGradient id="grad1" x1="0" y1="0" x2="25" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#47c1ff"></stop>
      <stop offset="50%" stop-color="#ffc371"></stop>
      <stop offset="100%" stop-color="#ff5f6d"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="25" height="25" rx="5" fill="url(#coolBg)"></rect>

  <!-- Left semi-circle -->
  <path d="M12.5 12.5 A5 5 0 1 1 7.5 7.5" fill="url(#grad1)"></path>

  <!-- Right semi-circle -->
  <path d="M12.5 12.5 A5 5 0 1 0 17.5 7.5" fill="url(#grad1)" transform="rotate(180 12.5 12.5)"></path>

  <!-- Center node -->
  <circle cx="12.5" cy="12.5" r="1.5" fill="#ffffff" stroke="#ff5f6d" stroke-width="1"></circle>
</svg>
